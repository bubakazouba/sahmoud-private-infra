<!doctype html><html><head><meta charset=utf-8><title>bookmarks</title>
<style>
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;margin:0;padding:24px;max-width:720px}
h1{color:#79c0ff;margin:0 0 16px}
form{display:grid;grid-template-columns:2fr 3fr 1fr auto;gap:8px;margin-bottom:16px}
input{background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:8px;border-radius:6px}
button{background:#238636;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer}
ul{list-style:none;padding:0;margin:0}
li{padding:10px;border-bottom:1px solid #21262d}
.title{color:#79c0ff;font-weight:600;font-size:15px}
.title a{color:inherit;text-decoration:none}
.title a:hover{text-decoration:underline}
.tag{display:inline-block;background:#1f6feb22;color:#79c0ff;padding:2px 6px;border-radius:10px;font-size:11px;margin-left:6px}
.url{color:#8b949e;font-size:12px;display:block;margin-top:2px}
.del{background:#da3633;color:#fff;padding:4px 8px;font-size:12px;float:right}
a{color:#79c0ff}
</style></head><body>
<h1>🔖 bookmarks</h1>
<form id=add>
<input id=title placeholder="title">
<input id=url placeholder="https://…">
<input id=tag placeholder="tag (optional)">
<button>add</button>
</form>
<ul id=list></ul>
<p style=margin-top:24px;color:#6e7681;font-size:11px>backend: flask · db: sqlite · <a href="../">↑ infra</a></p>
<script>
const BASE = "{{ base }}";
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function safeUrl(u){const s=String(u);return /^(https?:|mailto:|tel:)/i.test(s)?s:'#';}
async function load(){
  const j = await (await fetch(BASE+"/api/bookmarks")).json();
  document.getElementById("list").innerHTML = j.bookmarks.map(b =>
    `<li><button class=del onclick="del(${b.id})">×</button>
     <div class=title><a href="${esc(safeUrl(b.url))}" target=_blank rel="noopener noreferrer">${esc(b.title)}</a>${b.tag?'<span class=tag>'+esc(b.tag)+'</span>':''}</div>
     <div class=url>${esc(b.url)}</div></li>`).join("");
}
async function del(id){ await fetch(BASE+"/api/bookmarks/"+id,{method:"DELETE"}); load();}
document.getElementById("add").onsubmit = async e => {
  e.preventDefault();
  const title = document.getElementById("title").value.trim();
  const url = document.getElementById("url").value.trim();
  const tag = document.getElementById("tag").value.trim();
  if(!title || !url) return;
  await fetch(BASE+"/api/bookmarks",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title,url,tag})});
  document.getElementById("title").value="";document.getElementById("url").value="";document.getElementById("tag").value="";
  load();
};
load();
</script></body></html>
